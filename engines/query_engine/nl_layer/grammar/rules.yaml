    maps_to:
      type: intent
      intent_id: prev_day_level_acceptance_h60
      params_from_slots:
        level: level
        side: side
        minutes: minutes

    patterns:
      # acceptance ITA (con keyword "accettazione" -> deve vincere su LV04)
      - "accettazione vah sopra 10m"
      - "accettazione val sotto 10m"
      - "accettazione sopra vah 10m"
      - "accettazione sotto val 10m"
      - "accettazione vah sopra 10 min"
      - "accettazione val sotto 10 min"
      - "accettazione vah sopra 10 minuti"
      - "accettazione val sotto 10 minuti"
      - "accettazione sopra vah 10 min"
      - "accettazione sotto val 10 min"
      - "accettazione sopra vah 10 minuti"
      - "accettazione sotto val 10 minuti"
      - "accettazione vwap sopra 10m"
      - "accettazione poc entro 5m"
      - "accettazione poc sopra entro 5m"
      - "accettazione poc sotto entro 5m"

      # acceptance EN (con keyword "acceptance")
      - "acceptance vah above 10m"
      - "acceptance val below 10m"
      - "acceptance above vah 10m"
      - "acceptance below val 10m"
      - "acceptance vah above 10 minutes"
      - "acceptance val below 10 minutes"
      - "acceptance vwap above 10m"
      - "acceptance poc within 5m"
      - "acceptance poc above within 5m"
      - "acceptance poc below within 5m"

      # esplicito lv01 (dev-style)
      - "lv01 vah above 10m"
      - "lv01 val below 10m"

    patterns_regex:
    - "(?i)\\b(accettazione|acceptance)\\b.*\\b(vah|val|vwap|poc)\\b.*\\b(sopra|above|sotto|below)\\b.*\\b(entro|within)?\\s*\\d{1,3}\\s*(m|min|minutes|minuti)\\b"
    - "(?i)\\b(accettazione|acceptance)\\b.*\\b(sopra|above|sotto|below)\\b.*\\b(vah|val|vwap|poc)\\b.*\\b(entro|within)?\\s*\\d{1,3}\\s*(m|min|minutes|minuti)\\b"

  - id: rule_lv01_level_acceptance_missing_side
    priority: 96

    # stessa intent, ma quando manca side vogliamo un messaggio mirato
    maps_to:
      type: intent
      intent_id: prev_day_level_acceptance_h60
      params_from_slots:
        level: level
        minutes: minutes

    # qui NON richiediamo side (cosĂŹ non fallisce per missing_slot a livello rule-match)
    slots:
      level: { required: true }
      minutes: { required: true }

    patterns:
      - "accettazione poc entro 5m"
      - "acceptance poc within 5m"

    forbidden_terms:
      - "p("
      - "|"
      - "p_success"
      - "probabilitĂ "
      - "probabilita"
      - "condizionato"
      - "conditional"
      - "success |"
      - "successo |"


    patterns_regex:
      - "(?i)^(?!.*\\bp\\s*\\().*(?<!\\w)(accettazione|acceptance)(?!\\w).*\\bpoc\\b.*\\b(entro|within)\\b\\s*\\d{1,3}\\s*(m|min|minutes|minuti)\\b"



  - id: rule_level_time_confirm
    priority: 90

    slots:
      level: { required: true }
      side: { required: true }
      minutes: { required: true }
      mode: { required: false, default: "nearest" }

    maps_to:
      type: intent
      intent_id: level_time_confirm_h60
      params_from_slots:
        level: level
        side: side
        minutes: minutes
        mode: mode

    patterns:
      # shorthand ITA (quelli dei test)
      - "vah sopra 10m"
      - "val sotto 10m"

      # timing ITA (brevi / naturali)
      - "sopra vah 10m"
      - "sotto val 10m"
      - "vah sopra 10 min"
      - "val sotto 10 min"
      - "vah sopra 10 minuti"
      - "val sotto 10 minuti"

      # timing ITA con "primo close" / "tempo" (senza mode)
      - "primo close sopra vah 10m"
      - "primo close sotto val 10m"
      - "tempo sopra vah 10m"
      - "tempo sotto val 10m"

      # timing ITA con "entro"
      - "primo close sopra vah entro 10m"
      - "primo close sotto val entro 10m"
      - "tempo sopra vah entro 10m"
      - "tempo sotto val entro 10m"

      # timing EN (brevi / naturali)
      - "vah above 10m"
      - "val below 10m"
      - "above vah 10m"
      - "below val 10m"
      - "vah above 10 minutes"
      - "val below 10 minutes"

      # timing EN con "first close" / "time"
      - "first close above vah 10m"
      - "first close below val 10m"
      - "time above vah 10m"
      - "time below val 10m"

      # timing EN con "within"
      - "first close above vah within 10m"
      - "first close below val within 10m"
      - "time above vah within 10m"
      - "time below val within 10m"

    forbidden_terms:
      - "accettazione"
      - "acceptance"

    patterns_regex:
      - "(?i)\\b(vah|val)\\b.*\\b(sopra|above|sotto|below)\\b.*\\b\\d{1,3}\\s*(m|min|minutes|minuti)\\b"
      - "(?i)\\b(sopra|above|sotto|below)\\b.*\\b(vah|val)\\b.*\\b\\d{1,3}\\s*(m|min|minutes|minuti)\\b"



